<body data-profile-page="idoso" class="hc-idoso-module">
  <script>
    try {
      localStorage.setItem("homeCareActiveProfile", "idoso");
      localStorage.setItem("homecare-active-profile", "idoso");
    } catch (error) {}
  </script>
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4 mb-5">
        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="appToast" class="toast border-0 shadow" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body" id="toastMessage">Ação realizada.</div>
              <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>
          </div>
        </div>

        
<section class="card border-0 shadow-sm rounded-4 mb-4">
  <div class="card-body p-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between gap-3">
      <div>
        <span class="badge text-bg-primary mb-2"><i class="bi bi-person-gear me-1"></i> Conta</span>
        <h1 class="h3 fw-bold mb-2">Configurações</h1>
        <p class="text-muted mb-0">Ajuste preferências de notificações, acessibilidade e funcionamento do sistema.</p>
      </div>
      <div class="d-grid d-sm-flex gap-2">
        <a href="perfil.html" class="btn btn-outline-primary"><i class="bi bi-person me-1"></i> Perfil</a>
        <a href="permissoes.html" class="btn btn-outline-primary"><i class="bi bi-shield-check me-1"></i> Permissões</a>
        <a href="seguranca.html" class="btn btn-outline-primary"><i class="bi bi-lock me-1"></i> Segurança</a>
      </div>
    </div>
  </div>
</section>

<div class="row g-4">
  <div class="col-12 col-xl-8">
    <section class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">
        <h2 class="h5 fw-bold mb-3"><i class="bi bi-bell me-2 text-primary"></i> Notificações</h2>
        <div class="d-grid gap-3">
          <div class="form-check form-switch border rounded-4 p-3 ps-5">
            <input class="form-check-input" type="checkbox" id="notMedicamentos" checked>
            <label class="form-check-label" for="notMedicamentos"><strong>Medicamentos</strong><span class="d-block text-muted">Avisar horários, atrasos e doses confirmadas.</span></label>
          </div>
          <div class="form-check form-switch border rounded-4 p-3 ps-5">
            <input class="form-check-input" type="checkbox" id="notExames" checked>
            <label class="form-check-label" for="notExames"><strong>Exames e vacinas</strong><span class="d-block text-muted">Lembrar preparo, agendamentos e resultados.</span></label>
          </div>
          <div class="form-check form-switch border rounded-4 p-3 ps-5">
            <input class="form-check-input" type="checkbox" id="notCritico" checked>
            <label class="form-check-label" for="notCritico"><strong>Alertas críticos</strong><span class="d-block text-muted">Sempre avisar quando houver risco ou emergência.</span></label>
          </div>
        </div>
      </div>
    </section>

    <section class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h2 class="h5 fw-bold mb-3"><i class="bi bi-universal-access me-2 text-primary"></i> Acessibilidade</h2>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Tamanho dos textos</label>
            <select id="tamanhoTexto" class="form-select form-select-lg">
              <option>Padrão grande</option>
              <option>Extra grande</option>
              <option>Máximo</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Modo de orientação</label>
            <select class="form-select form-select-lg">
              <option>Guiado passo a passo</option>
              <option>Resumido</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-lg w-100 mt-4" id="btnSalvarConfiguracoes"><i class="bi bi-check2-circle me-1"></i> Salvar configurações</button>
      </div>
    </section>
  </div>

  <div class="col-12 col-xl-4">
    <section class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <h2 class="h5 fw-bold mb-3"><i class="bi bi-phone me-2 text-primary"></i> Canais ativos</h2>
        <div class="d-grid gap-3">
          <div class="border rounded-4 p-3"><i class="bi bi-whatsapp text-success me-2"></i><strong>WhatsApp</strong><p class="text-muted mb-0">(11) 98888-0000</p></div>
          <div class="border rounded-4 p-3"><i class="bi bi-envelope text-primary me-2"></i><strong>E-mail</strong><p class="text-muted mb-0">jaqueline@email.com</p></div>
          <div class="border rounded-4 p-3"><i class="bi bi-app-indicator text-primary me-2"></i><strong>Aplicativo</strong><p class="text-muted mb-0">Notificações permitidas</p></div>
        </div>
      </div>
    </section>
  </div>
</div>

      </div>
    </main>
  </div>

  <div id="appFooter"></div>

<script>
    function mostrarToast(mensagem) {
      document.getElementById("toastMessage").textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(document.getElementById("appToast")).show();
    }

    document.addEventListener("DOMContentLoaded", function() {


});
  </script>
  <script>
document.getElementById("btnSalvarConfiguracoes").addEventListener("click", function() {
  mostrarToast("Configurações salvas com sucesso.");
});
</script>

</body>
</html>
