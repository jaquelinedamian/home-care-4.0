<body data-profile-page="idoso" class="hc-idoso-module">

        <section class="row g-4">
          <div class="col-12 col-xl-4"><section class="card border-0 shadow-sm rounded-4"><div class="card-body p-4"><label for="buscarConversa" class="form-label">Buscar conversa ou contato</label><input id="buscarConversa" class="form-control form-control-lg mb-3" type="search" placeholder="Nome, pessoa, profissional ou assunto" data-message-search><div class="hc-conversation-list"><button class="hc-conversation-card is-active" type="button" data-conversation data-conversation-title="Enfermeira Ana" data-conversation-subtitle="Profissional de enfermagem" data-conversation-avatar="EA" data-conversation-type="Profissional" data-conversation-bond="Cuidadora vinculada" data-conversation-status="Online hoje as 09:20" data-conversation-profile="COREN ativo, visita domiciliar, acompanha pressao e medicamentos" data-conversation-profile-url="/pages/idoso/servicos-profissional-detalhes.html" data-conversation-search="enfermeira ana medicacao pressao cuidadora" data-conversation-messages="Bom dia! A pressao foi medida depois do cafe?|Sim, cerca de 20 minutos depois.|Pode repetir a medicao em 10 minutos e me avisar?">
                    <span class="hc-conversation-avatar" aria-hidden="true">EA</span>
                    <span class="hc-conversation-body"><strong>Enfermeira Ana</strong><small>Profissional de enfermagem</small></span>
                    <span class="hc-conversation-meta"><span>Online hoje as 09:20</span><i class="bi bi-chevron-right" aria-hidden="true"></i></span>
                  </button>
<button class="hc-conversation-card" type="button" data-conversation data-conversation-title="Dr. Carlos" data-conversation-subtitle="Geriatra responsavel pela consulta" data-conversation-avatar="DC" data-conversation-type="Profissional" data-conversation-bond="Consulta marcada" data-conversation-status="Disponivel as 14:00" data-conversation-profile="CRM validado, retorno de consulta, revisao de exames" data-conversation-profile-url="/pages/idoso/consultas-detalhes.html" data-conversation-search="dr carlos consulta exames geriatra" data-conversation-messages="Seu retorno esta confirmado para sexta.|Vou separar os exames recentes.|Otimo, leve tambem a lista de medicamentos.">
                    <span class="hc-conversation-avatar" aria-hidden="true">DC</span>
                    <span class="hc-conversation-body"><strong>Dr. Carlos</strong><small>Geriatra responsavel pela consulta</small></span>
                    <span class="hc-conversation-meta"><span>Disponivel as 14:00</span><i class="bi bi-chevron-right" aria-hidden="true"></i></span>
                  </button>
<button class="hc-conversation-card" type="button" data-conversation data-conversation-title="Familia e cuidadores" data-conversation-subtitle="Grupo familiar autorizado" data-conversation-avatar="FC" data-conversation-type="Familiar" data-conversation-bond="Permissao ativa" data-conversation-status="2 pessoas online" data-conversation-profile="Filha, cuidador e contato de emergencia acompanham a rotina" data-conversation-profile-url="/pages/idoso/permissoes.html" data-conversation-search="familia cuidador joao permissao" data-conversation-messages="Joao confirmou que passa hoje as 18h.|Obrigado, vou deixar o remedio separado.|Se precisar, acionamos o alerta pelo painel.">
                    <span class="hc-conversation-avatar" aria-hidden="true">FC</span>
                    <span class="hc-conversation-body"><strong>Familia e cuidadores</strong><small>Grupo familiar autorizado</small></span>
                    <span class="hc-conversation-meta"><span>2 pessoas online</span><i class="bi bi-chevron-right" aria-hidden="true"></i></span>
                  </button></div></div></section></div>
          <div class="col-12 col-xl-8"><section class="card border-0 shadow-sm rounded-4 hc-chat-panel" data-chat-panel><div class="card-body p-4"><div class="d-flex flex-column gap-3 border-bottom pb-3 mb-4"><div class="d-flex flex-column flex-md-row justify-content-between gap-3"><div><h2 class="h4 mb-1" data-chat-title>Enfermeira Ana</h2><p class="text-muted mb-0" data-chat-subtitle>Profissional de enfermagem</p></div><div class="hc-chat-actions"><button class="btn btn-outline-primary hc-chat-action-btn" type="button" data-call-contact><i class="bi bi-telephone me-2"></i>Ligar</button><button class="btn btn-outline-secondary hc-chat-action-btn" type="button" data-favorite-contact><i class="bi bi-star me-2"></i>Favoritar</button><a class="btn btn-outline-primary hc-chat-action-btn" href="#" data-view-profile><i class="bi bi-person-vcard me-2"></i>Ver perfil</a><button class="btn btn-outline-warning hc-chat-action-btn" type="button" data-block-contact><i class="bi bi-slash-circle me-2"></i>Bloquear</button><button class="btn btn-outline-danger hc-chat-action-btn" type="button" data-delete-conversation><i class="bi bi-trash me-2"></i>Excluir</button></div></div><div data-contact-profile></div></div><div class="hc-chat-thread mb-4" data-chat-thread></div><form data-message-form><label for="novaMensagem" class="form-label">Enviar mensagem</label><div class="input-group input-group-lg"><input id="novaMensagem" class="form-control" placeholder="Digite uma mensagem clara" data-message-field><button class="btn btn-primary" type="submit"><i class="bi bi-send me-2"></i>Enviar</button></div></form></div></section></div>
        </section>
      </div>
