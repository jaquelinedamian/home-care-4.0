  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function mostrarToast(mensagem) {
      const toastEl = document.getElementById("appToast");
      const toastMessage = document.getElementById("toastMessage");

      if (!toastEl || !toastMessage || !window.bootstrap) return;

      toastMessage.textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(toastEl).show();
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("[data-toast]").forEach(function (button) {
        button.addEventListener("click", function () {
          mostrarToast(button.dataset.toast || "Ação realizada.");
        });
      });

      document.querySelectorAll("[data-filter-target]").forEach(function (button) {
        button.addEventListener("click", function () {
          const targetSelector = button.dataset.filterTarget;
          const status = button.dataset.filterStatus;
          const target = document.querySelector(targetSelector);

          if (!target) return;

          target.querySelectorAll("[data-status]").forEach(function (item) {
            const shouldShow = !status || status === "todos" || item.dataset.status === status;
            item.classList.toggle("d-none", !shouldShow);
          });

          button.parentElement.querySelectorAll("button").forEach(function (sibling) {
            sibling.classList.remove("active");
            sibling.setAttribute("aria-pressed", "false");
          });

          button.classList.add("active");
          button.setAttribute("aria-pressed", "true");
        });
      });
    });
  </script>
