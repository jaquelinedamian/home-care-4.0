<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Avaliações | Home Care 4.0</title>

  <meta
    name="description"
    content="Avalie profissionais, consulte avaliações feitas e acompanhe a qualidade dos atendimentos contratados."
  />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/profile-switcher.css" />
  <link rel="stylesheet" href="../../css/sidebar.css" />
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body data-profile-page="idoso" class="hc-idoso-module">
  <script>
    try {
      localStorage.setItem("homeCareActiveProfile", "idoso");
      localStorage.setItem("homecare-active-profile", "idoso");
    } catch (error) {}
  </script>
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4">

        <section class="mb-4">
          <h1 class="fw-bold">Avaliações</h1>
          <p class="text-muted">Avalie atendimentos concluídos.</p>
        </section>

        <div class="card shadow-sm rounded-4 p-4 mb-3">
          <h5 class="fw-bold">Fisioterapia domiciliar</h5>
          <p class="text-muted">Ana Paula Martins</p>

          <button
            class="btn btn-primary open-review-btn"
            data-bs-toggle="modal"
            data-bs-target="#reviewModal"
            data-professional="Ana Paula Martins"
            data-service="Fisioterapia domiciliar"
          >
            Avaliar agora
          </button>
        </div>

      </div>
    </main>
  </div>

  <div id="appFooter"></div>


  <div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content rounded-4">

        <div class="modal-header">
          <div>
            <h5 class="fw-bold">Avaliar atendimento</h5>
            <p class="text-muted mb-0" id="reviewModalDescription"></p>
          </div>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <span id="stepText">Etapa 1 de 4</span>
              <span id="stepLabel">Nota</span>
            </div>

            <div class="progress mt-2" style="height:8px;">
              <div class="progress-bar" id="progressBar" style="width:25%"></div>
            </div>
          </div>

          <div class="step" data-step="1">
            <h5 class="fw-bold mb-3">Qual a nota?</h5>

            <div class="d-flex gap-2 flex-wrap">
              <button class="btn btn-outline-primary rating" data-val="1">1</button>
              <button class="btn btn-outline-primary rating" data-val="2">2</button>
              <button class="btn btn-outline-primary rating" data-val="3">3</button>
              <button class="btn btn-outline-primary rating" data-val="4">4</button>
              <button class="btn btn-outline-primary rating active" data-val="5">5</button>
            </div>
          </div>

          <div class="step d-none" data-step="2">
            <h5 class="fw-bold mb-3">Detalhes do atendimento</h5>

            <div class="row g-3">
              <div class="col-md-6">
                <label>Preço</label>
                <select class="form-select">
                  <option>Excelente</option>
                  <option>Bom</option>
                  <option>Ruim</option>
                </select>
              </div>

              <div class="col-md-6">
                <label>Técnica</label>
                <select class="form-select">
                  <option>Excelente</option>
                  <option>Bom</option>
                  <option>Ruim</option>
                </select>
              </div>
            </div>
          </div>

          <div class="step d-none" data-step="3">
            <h5 class="fw-bold mb-3">Destaques</h5>

            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-light border tag">Pontual</button>
              <button class="btn btn-light border tag">Cuidadoso</button>
              <button class="btn btn-light border tag">Educado</button>
            </div>
          </div>

          <div class="step d-none" data-step="4">
            <h5 class="fw-bold mb-3">Comentário</h5>

            <textarea class="form-control" rows="4"></textarea>
          </div>

        </div>

        <div class="modal-footer d-flex justify-content-between">
          <button class="btn btn-outline-secondary" id="prevBtn">Voltar</button>

          <div>
            <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-primary" id="nextBtn">Próximo</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let step = 1;

    const steps = document.querySelectorAll(".step");
    const progress = document.getElementById("progressBar");
    const stepText = document.getElementById("stepText");
    const stepLabel = document.getElementById("stepLabel");

    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");

    const labels = {
      1: "Nota",
      2: "Detalhes",
      3: "Destaques",
      4: "Comentário"
    };

    function update() {
      steps.forEach(s => s.classList.add("d-none"));
      document.querySelector(`[data-step="${step}"]`).classList.remove("d-none");

      progress.style.width = (step * 25) + "%";
      stepText.innerText = `Etapa ${step} de 4`;
      stepLabel.innerText = labels[step];

      prevBtn.disabled = step === 1;
      nextBtn.innerText = step === 4 ? "Salvar" : "Próximo";
    }

    nextBtn.onclick = () => {
      if (step < 4) {
        step++;
        update();
      } else {
        nextBtn.innerText = "Salvo!";
        nextBtn.classList.replace("btn-primary", "btn-success");
      }
    };

    prevBtn.onclick = () => {
      if (step > 1) {
        step--;
        update();
      }
    };

    document.querySelectorAll(".rating").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".rating").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };
    });

    document.querySelectorAll(".tag").forEach(tag => {
      tag.onclick = () => {
        tag.classList.toggle("btn-primary");
        tag.classList.toggle("btn-light");
      };
    });

    update();
  </script>
  <script src="../../js/app-shell.js?v=20260524"></script>
  <script src="../../js/profile-switcher.js?v=20260524d"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
