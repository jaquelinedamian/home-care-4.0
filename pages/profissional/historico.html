<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Histórico profissional | Home Care 4.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/profile-switcher.css" />
  <link rel="stylesheet" href="../../css/sidebar.css" />
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4">
        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="appToast" class="toast align-items-center border-0 shadow" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body" id="toastMessage">Ação realizada.</div>
              <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>
          </div>
        </div>

        <section class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4 p-lg-5">
            <div class="row align-items-center g-4">
              <div class="col-12 col-lg-8">
                <p class="text-muted fs-5 mb-1">Histórico profissional</p>
                <h1 class="fw-bold mb-3">Atendimentos realizados e ações do perfil</h1>
                <p class="text-muted fs-5 mb-0">Consulte serviços concluídos, cancelamentos, avaliações e alterações importantes.</p>
              </div>
              <div class="col-12 col-lg-4">
                <div class="d-grid gap-2">
                  <a href="atendimentos.html" class="btn btn-outline-primary btn-lg"><i class="bi bi-calendar2-week me-2"></i>Voltar para agenda</a>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4">
            <div class="row g-3">
              <div class="col-12 col-md-4"><label class="form-label" for="busca">Buscar</label><input id="busca" class="form-control form-control-lg" placeholder="Paciente ou serviço"></div>
              <div class="col-12 col-md-4"><label class="form-label" for="tipo">Tipo</label><select id="tipo" class="form-select form-select-lg"><option value="">Todos</option><option>Atendimento</option><option>Perfil</option><option>Financeiro</option></select></div>
              <div class="col-12 col-md-4"><label class="form-label" for="status">Status</label><select id="status" class="form-select form-select-lg"><option value="">Todos</option><option>Concluído</option><option>Cancelado</option><option>Atualizado</option></select></div>
            </div>
          </div>
        </section>
        <section id="listaHistorico" class="d-grid gap-3"></section>
      </div>
    </main>
  </div>

  <div id="appFooter"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function mostrarToast(mensagem) {
      document.getElementById("toastMessage").textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(document.getElementById("appToast")).show();
    }


    const historico = [
      {tipo:"Atendimento", status:"Concluído", titulo:"Dona Maria", texto:"Avaliação geriátrica concluída em 20/04/2026"},
      {tipo:"Atendimento", status:"Cancelado", titulo:"Sr. Antônio", texto:"Fisioterapia cancelada pelo paciente"},
      {tipo:"Perfil", status:"Atualizado", titulo:"Médico geriatra", texto:"Valor base alterado para R$ 320"},
      {tipo:"Financeiro", status:"Concluído", titulo:"Repasse recebido", texto:"Pagamento de R$ 650 recebido"}
    ];

    function renderizarHistorico() {
      const busca = document.getElementById("busca").value.toLowerCase();
      const tipo = document.getElementById("tipo").value;
      const status = document.getElementById("status").value;

      document.getElementById("listaHistorico").innerHTML = historico.filter(function(item) {
        return (!busca || (item.titulo + item.texto).toLowerCase().includes(busca)) && (!tipo || item.tipo === tipo) && (!status || item.status === status);
      }).map(function(item) {
        return '<article class="card border-0 shadow-sm rounded-4"><div class="card-body p-4"><span class="badge text-bg-light border mb-2">' + item.tipo + '</span><h2 class="h5 mb-1"><i class="bi bi-clock-history me-2"></i>' + item.titulo + '</h2><p class="text-muted mb-0">' + item.texto + '</p></div></article>';
      }).join("");
    }

    ["busca","tipo","status"].forEach(function(id) {
      document.getElementById(id).addEventListener(id === "busca" ? "input" : "change", renderizarHistorico);
    });

    renderizarHistorico();

  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {


});
</script>
  <script src="../../js/app-shell.js?v=20260524"></script>
  <script src="../../js/profile-switcher.js?v=20260524d"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
