<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Editar perfil | Home Care 4.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/profile-switcher.css" />
  <link rel="stylesheet" href="../../css/sidebar.css" />
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4">
        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="appToast" class="toast align-items-center border-0 shadow" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body" id="toastMessage">Ação realizada.</div>
              <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>
          </div>
        </div>

        <section class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4 p-lg-5">
            <div class="row align-items-center g-4">
              <div class="col-12 col-lg-8">
                <p class="text-muted fs-5 mb-1">Editar perfil</p>
                <h1 class="fw-bold mb-3">Atualize dados do perfil profissional</h1>
                <p class="text-muted fs-5 mb-0">Altere apresentação, valores, disponibilidade e dados de atuação. Tudo com confirmação em popup.</p>
              </div>
              <div class="col-12 col-lg-4">
                <div class="d-grid gap-2">
                  <a href="meus-perfis.html" class="btn btn-outline-secondary btn-lg"><i class="bi bi-arrow-left me-2"></i>Voltar aos perfis</a>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">
            <form id="formEditar" class="row g-3">
              <div class="col-12 col-lg-6">
                <label for="tituloPerfil" class="form-label">Título do perfil</label>
                <input id="tituloPerfil" class="form-control form-control-lg" value="Médico geriatra">
              </div>

              <div class="col-12 col-lg-6">
                <label for="valorConsulta" class="form-label">Valor base</label>
                <input id="valorConsulta" class="form-control form-control-lg" value="320">
              </div>

              <div class="col-12">
                <label for="descricao" class="form-label">Descrição profissional</label>
                <textarea id="descricao" rows="5" class="form-control form-control-lg">Atendimento humanizado para idosos, revisão de medicamentos e acompanhamento domiciliar.</textarea>
              </div>

              <div class="col-12 col-lg-6">
                <label for="disponibilidade" class="form-label">Disponibilidade</label>
                <select id="disponibilidade" class="form-select form-select-lg">
                  <option>Segunda a sexta</option>
                  <option>Finais de semana</option>
                  <option>Plantões</option>
                  <option>Horários flexíveis</option>
                </select>
              </div>

              <div class="col-12 col-lg-6">
                <label for="regiao" class="form-label">Região de atendimento</label>
                <input id="regiao" class="form-control form-control-lg" value="Zona Oeste e Centro">
              </div>

              <div class="col-12 d-grid d-sm-flex gap-2">
                <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-circle me-2"></i>Salvar alterações</button>
                <button type="button" class="btn btn-outline-danger btn-lg" id="btnExcluir"><i class="bi bi-trash me-2"></i>Excluir perfil</button>
              </div>
            </form>
          </div>
        </section>

        <div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
              <div class="modal-header">
                <h2 class="modal-title h5" id="tituloModal">Confirmar</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
              </div>
              <div class="modal-body">
                <p class="mb-0" id="textoModal">Confirme a ação.</p>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnConfirmar">Confirmar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="appFooter"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function mostrarToast(mensagem) {
      document.getElementById("toastMessage").textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(document.getElementById("appToast")).show();
    }


    let acao = "salvar";
    const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalConfirmar"));

    document.getElementById("formEditar").addEventListener("submit", function(event) {
      event.preventDefault();
      acao = "salvar";
      document.getElementById("tituloModal").textContent = "Salvar alterações";
      document.getElementById("textoModal").textContent = "Deseja salvar as alterações deste perfil?";
      document.getElementById("btnConfirmar").className = "btn btn-primary";
      modal.show();
    });

    document.getElementById("btnExcluir").addEventListener("click", function() {
      acao = "excluir";
      document.getElementById("tituloModal").textContent = "Excluir perfil";
      document.getElementById("textoModal").textContent = "Deseja excluir este perfil profissional?";
      document.getElementById("btnConfirmar").className = "btn btn-danger";
      modal.show();
    });

    document.getElementById("btnConfirmar").addEventListener("click", function() {
      modal.hide();
      mostrarToast(acao === "salvar" ? "Perfil atualizado." : "Perfil excluído.");
    });

  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {


});
</script>
  <script src="../../js/app-shell.js?v=20260524"></script>
  <script src="../../js/profile-switcher.js?v=20260524d"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
