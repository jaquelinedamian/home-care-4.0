<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Solicitações profissionais | Home Care 4.0</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/profile-switcher.css" />
  <link rel="stylesheet" href="../../css/sidebar.css" />
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4">
        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="appToast" class="toast align-items-center border-0 shadow" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body" id="toastMessage">Ação realizada.</div>
              <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>
          </div>
        </div>

        <section class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4 p-lg-5">
            <div class="row align-items-center g-4">
              <div class="col-12 col-lg-8">
                <p class="text-muted fs-5 mb-1">Solicitações</p>
                <h1 class="fw-bold mb-3">Avalie pedidos de atendimento</h1>
                <p class="text-muted fs-5 mb-0">Aceite, recuse ou veja detalhes dos pedidos recebidos em seus perfis profissionais.</p>
              </div>
              <div class="col-12 col-lg-4">
                <div class="d-grid gap-2">
                  <a href="atendimentos.html" class="btn btn-outline-primary btn-lg"><i class="bi bi-calendar2-week me-2"></i>Agenda</a>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="row g-4" id="listaSolicitacoes"></section>
        <div class="modal fade" id="modalSolicitacao" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
              <div class="modal-header">
                <h2 class="modal-title h5">Detalhes da solicitação</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
              </div>
              <div class="modal-body" id="detalhesSolicitacao"></div>
              <div class="modal-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
                <button class="btn btn-primary" id="btnAceitarModal">Aceitar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="appFooter"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function mostrarToast(mensagem) {
      document.getElementById("toastMessage").textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(document.getElementById("appToast")).show();
    }


    const solicitacoes = [
      {paciente:"Dona Maria", servico:"Avaliação geriátrica", data:"30/04/2026", perfil:"Médico geriatra", valor:"R$ 320"},
      {paciente:"Sr. Antônio", servico:"Fisioterapia motora", data:"02/05/2026", perfil:"Fisioterapeuta", valor:"R$ 180"},
      {paciente:"Dona Helena", servico:"Curativo domiciliar", data:"04/05/2026", perfil:"Enfermeiro", valor:"R$ 150"}
    ];

    function renderizarSolicitacoes() {
      document.getElementById("listaSolicitacoes").innerHTML = solicitacoes.map(function(item, index) {
        return '<div class="col-12"><article class="card border-0 shadow-sm rounded-4"><div class="card-body p-4"><div class="row g-3 align-items-center"><div class="col-12 col-lg"><span class="badge text-bg-warning mb-2">Nova solicitação</span><h2 class="h4 mb-1"><i class="bi bi-inbox me-2"></i>' + item.paciente + '</h2><p class="text-muted mb-0">' + item.servico + ' • ' + item.data + ' • ' + item.perfil + ' • ' + item.valor + '</p></div><div class="col-12 col-lg-auto d-grid d-sm-flex gap-2"><button class="btn btn-primary btnAceitar" data-index="' + index + '">Aceitar</button><button class="btn btn-outline-primary btnDetalhes" data-index="' + index + '">Detalhes</button><button class="btn btn-outline-danger btnRecusar" data-index="' + index + '">Recusar</button></div></div></div></article></div>';
      }).join("");
    }

    document.getElementById("listaSolicitacoes").addEventListener("click", function(event) {
      const aceitar = event.target.closest(".btnAceitar");
      const recusar = event.target.closest(".btnRecusar");
      const detalhes = event.target.closest(".btnDetalhes");

      if (aceitar) mostrarToast("Solicitação aceita e adicionada à agenda.");
      if (recusar) mostrarToast("Solicitação recusada.");
      if (detalhes) {
        const item = solicitacoes[detalhes.dataset.index];
        document.getElementById("detalhesSolicitacao").innerHTML = '<div class="d-grid gap-3"><div><span class="text-muted d-block">Paciente</span><strong>' + item.paciente + '</strong></div><div><span class="text-muted d-block">Serviço</span><strong>' + item.servico + '</strong></div><div><span class="text-muted d-block">Data</span><strong>' + item.data + '</strong></div></div>';
        bootstrap.Modal.getOrCreateInstance(document.getElementById("modalSolicitacao")).show();
      }
    });

    document.getElementById("btnAceitarModal").addEventListener("click", function() {
      bootstrap.Modal.getOrCreateInstance(document.getElementById("modalSolicitacao")).hide();
      mostrarToast("Solicitação aceita.");
    });

    renderizarSolicitacoes();

  </script>

<script>
  document.addEventListener("DOMContentLoaded", function () {


});
</script>
  <script src="../../js/app-shell.js?v=20260524"></script>
  <script src="../../js/profile-switcher.js?v=20260524d"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
