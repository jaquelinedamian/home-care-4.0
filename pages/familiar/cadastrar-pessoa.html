<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar pessoa cuidada | Home Care 4.0</title>
  <meta name="description" content="Formulário para adicionar uma nova pessoa cuidada ao acompanhamento familiar." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/header.css" />
  <link rel="stylesheet" href="../../css/profile-switcher.css" />
  <link rel="stylesheet" href="../../css/sidebar.css" />
  <link rel="stylesheet" href="../../css/main.css" />

  <style>
    .hc-familiar-hero {
      background: linear-gradient(135deg, rgba(13, 110, 253, .09), rgba(111, 66, 193, .08));
      border: 1px solid rgba(13, 110, 253, .12);
    }

    .hc-familiar-kicker {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: 1rem;
      font-weight: 700;
      color: #0d6efd;
      margin-bottom: .75rem;
    }

    .hc-familiar-title {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.08;
      letter-spacing: -.03em;
    }

    .hc-familiar-lead {
      font-size: clamp(1.05rem, 1.8vw, 1.25rem);
      line-height: 1.55;
    }

    .hc-big-card {
      min-height: 100%;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .hc-big-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 .75rem 2rem rgba(15, 23, 42, .08) !important;
    }

    .hc-icon-box {
      width: 3.25rem;
      height: 3.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 1rem;
      background: rgba(13, 110, 253, .1);
      color: #0d6efd;
      font-size: 1.55rem;
      flex: 0 0 auto;
    }

    .hc-person-pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .55rem .85rem;
      border-radius: 999px;
      background: rgba(13, 110, 253, .09);
      color: #0d6efd;
      font-weight: 700;
    }

    .hc-list-item {
      border: 1px solid rgba(15, 23, 42, .08);
      border-radius: 1.25rem;
      padding: 1rem;
      background: #fff;
    }

    .hc-time {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .hc-touch-btn {
      min-height: 3.35rem;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .hc-soft-primary { background: rgba(13, 110, 253, .10); }
    .hc-soft-warning { background: rgba(255, 193, 7, .15); }
    .hc-soft-success { background: rgba(25, 135, 84, .12); }
    .hc-soft-danger { background: rgba(220, 53, 69, .10); }
    .hc-soft-info { background: rgba(13, 202, 240, .12); }
    .hc-soft-purple { background: rgba(111, 66, 193, .10); }

    .hc-avatar {
      width: 3rem;
      height: 3rem;
      border-radius: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 110, 253, .1);
      color: #0d6efd;
      font-weight: 800;
      flex: 0 0 auto;
    }
  </style>
</head>

<body data-active-profile="familiar">
  <div id="appHeader"></div>
  <div id="appProfileSwitcher"></div>

  <div class="app-layout">
    <div id="appSidebar"></div>

    <main class="app-main app-main-with-sidebar" id="conteudo-principal" tabindex="-1">
      <div class="container py-4">

        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="appToast" class="toast align-items-center border-0 shadow" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body" id="toastMessage">Ação realizada.</div>
              <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
            </div>
          </div>
        </div>

        <section class="card border-0 shadow-sm rounded-4 mb-4" aria-label="Atalhos do módulo familiar">
          <div class="card-body p-3 p-lg-4">
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-outline-primary" href="/pages/familiar/dashboard.html"><i class="bi bi-house me-2" aria-hidden="true"></i>Início</a>
              <a class="btn btn-outline-primary" href="/pages/familiar/pessoas-cuidadas.html"><i class="bi bi-people me-2" aria-hidden="true"></i>Pessoas cuidadas</a>
              <a class="btn btn-outline-primary" href="/pages/familiar/agenda.html"><i class="bi bi-calendar-check me-2" aria-hidden="true"></i>Agenda</a>
              <a class="btn btn-outline-primary" href="/pages/familiar/medicamentos.html"><i class="bi bi-capsule me-2" aria-hidden="true"></i>Medicamentos</a>
              <a class="btn btn-outline-primary" href="/pages/familiar/dispositivos.html"><i class="bi bi-smartwatch me-2" aria-hidden="true"></i>Dispositivos</a>
              <a class="btn btn-outline-primary" href="/pages/familiar/servicos.html"><i class="bi bi-search-heart me-2" aria-hidden="true"></i>Serviços</a>
              <a class="btn btn-outline-danger" href="/pages/familiar/emergencia.html"><i class="bi bi-exclamation-triangle me-2" aria-hidden="true"></i>Ajuda</a>
            </div>
          </div>
        </section>

        <section class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4 p-lg-5">
            <span class="hc-familiar-kicker"><i class="bi bi-person-plus" aria-hidden="true"></i>Novo acompanhamento</span>
            <h1 class="fw-bold hc-familiar-title mb-3">Adicionar pessoa cuidada</h1>
            <p class="text-muted hc-familiar-lead mb-0">Cadastre os dados essenciais para começar o acompanhamento com segurança e clareza.</p>
          </div>
        </section>

        <form class="card border-0 shadow-sm rounded-4" aria-label="Cadastro de pessoa cuidada">
          <div class="card-body p-4 p-lg-5">
            <div class="row g-3">
              <div class="col-12 col-lg-8">
                <label class="form-label fw-semibold" for="nomePessoa">Nome completo</label>
                <input class="form-control form-control-lg" id="nomePessoa" type="text" placeholder="Ex.: Maria Aparecida Silva" />
              </div>
              <div class="col-12 col-lg-4">
                <label class="form-label fw-semibold" for="parentesco">Parentesco</label>
                <select class="form-select form-select-lg" id="parentesco">
                  <option>Mãe</option>
                  <option>Pai</option>
                  <option>Avó/Avô</option>
                  <option>Cônjuge</option>
                  <option>Outro</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="dataNascimento">Data de nascimento</label>
                <input class="form-control form-control-lg" id="dataNascimento" type="date" />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="cpfPessoa">CPF</label>
                <input class="form-control form-control-lg" id="cpfPessoa" type="text" placeholder="000.000.000-00" />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label fw-semibold" for="telefonePessoa">Telefone</label>
                <input class="form-control form-control-lg" id="telefonePessoa" type="tel" placeholder="(00) 00000-0000" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold" for="observacoes">Observações importantes</label>
                <textarea class="form-control" id="observacoes" rows="4" placeholder="Alergias, limitações, rotina, contatos de referência..."></textarea>
              </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-4">
              <button type="button" class="btn btn-primary btn-lg hc-touch-btn" data-toast="Pessoa cuidada cadastrada em modo demonstrativo.">Salvar cadastro</button>
              <a class="btn btn-outline-secondary btn-lg hc-touch-btn" href="/pages/familiar/pessoas-cuidadas.html">Cancelar</a>
            </div>
          </div>
        </form>

      </div>
    </main>
  </div>

  <div id="appFooter"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function mostrarToast(mensagem) {
      const toastEl = document.getElementById("appToast");
      const toastMessage = document.getElementById("toastMessage");

      if (!toastEl || !toastMessage || !window.bootstrap) return;

      toastMessage.textContent = mensagem;
      bootstrap.Toast.getOrCreateInstance(toastEl).show();
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("[data-toast]").forEach(function (button) {
        button.addEventListener("click", function () {
          mostrarToast(button.dataset.toast || "Ação realizada.");
        });
      });

      document.querySelectorAll("[data-filter-target]").forEach(function (button) {
        button.addEventListener("click", function () {
          const targetSelector = button.dataset.filterTarget;
          const status = button.dataset.filterStatus;
          const target = document.querySelector(targetSelector);

          if (!target) return;

          target.querySelectorAll("[data-status]").forEach(function (item) {
            const shouldShow = !status || status === "todos" || item.dataset.status === status;
            item.classList.toggle("d-none", !shouldShow);
          });

          button.parentElement.querySelectorAll("button").forEach(function (sibling) {
            sibling.classList.remove("active");
            sibling.setAttribute("aria-pressed", "false");
          });

          button.classList.add("active");
          button.setAttribute("aria-pressed", "true");
        });
      });
    });
  </script>
  <script src="../../js/app-shell.js?v=20260524"></script>
  <script src="../../js/profile-switcher.js?v=20260524f"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
